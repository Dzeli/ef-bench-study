<script>
// ════════════════════════════════════════════════════════════════════════════
//  CONFIGURATION — edit these two lines before deploying
// ════════════════════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF1GnygX2MPTb6gePIPp0u4yRjbfvciqlNAZSTzWmSNrqpkFqI2r2TYa0r8ZOjp5XepQ/exec";   // paste your Google Apps Script Web App URL here
const STUDY_CODE = "EFB2026"; // shown to participants as completion code

// ════════════════════════════════════════════════════════════════════════════
//  TASK DATA
// ════════════════════════════════════════════════════════════════════════════
const ESTABLISHMENT = [
  { s: "The cat slept on the warm radiator.", living: true  },
  { s: "A candle flickered on the kitchen table.", living: false },
  { s: "The children ran through the autumn leaves.", living: true  },

  { s: "A robin perched on the garden fence.", living: true  },
  { s: "The kettle whistled on the stove.", living: false },
  { s: "The farmer's dog barked at the gate.", living: true  },
  { s: "An empty bottle rolled across the floor.", living: false },
  { s: "Wildflowers grew along the riverbank.", living: true  },
  { s: "The clock on the wall stopped ticking.", living: false },
];

const POST_SWITCH = [
  { s: "A squirrel buried nuts under the oak tree.", living: true  },
  { s: "The hammer lay on the workbench.", living: false },
  { s: "Three crows circled above the field.", living: true  },
  { s: "The broken window let in the cold air.", living: false },
  { s: "The old mare grazed in the meadow.", living: true  },
  { s: "Dust settled on the empty shelf.", living: false },
  { s: "A moth flew toward the porch light.", living: true  },
  { s: "The iron gate creaked in the wind.", living: false },
  { s: "The shepherd guided his flock downhill.", living: true  },
  { s: "Snow covered the abandoned car.", living: false },
];

const NOVEL = [
  { s: "Bacteria spread across the petri dish.", living: true  },
  { s: "A cactus stood in the corner of the room.", living: true  },
  { s: "The robot moved along the warehouse floor.", living: false },
  { s: "A flame flickered at the tip of the candle.", living: false },
  { s: "A crystal grew slowly inside the sealed jar.", living: false },
];

const ALL_TRIALS = [...ESTABLISHMENT, ...POST_SWITCH, ...NOVEL];
const CONDITIONS = ["explicit", "partial_3", "implicit"];

const HINT = "Note: the rule governing correct responses may have changed.";
const NEW_RULE_ANNOUNCEMENT = `The rule has changed.\n\nNEW RULE: If the sentence contains a living thing → respond OBJECT.\nIf it does not → respond ALIVE.`;

// ════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════════════
function getCorrect(trial, idx) {
  if (idx < 10) return trial.living ? "ALIVE" : "OBJECT";
  return trial.living ? "OBJECT" : "ALIVE";
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function pickCondition() {
  try {
    const n = parseInt(localStorage.getItem('efb_count') || '0');
    localStorage.setItem('efb_count', String(n + 1));
    return CONDITIONS[n % 3];
  } catch (e) {
    return CONDITIONS[Math.floor(Math.random() * 3)];
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
const S = {
  view: 'welcome',
  pid: genId(),
  condition: pickCondition(),
  trialIdx: 0,
  responses: [],
  feedback: null,
  consec: 0,
  demographics: {},
  metacog: '',
  saving: false,
  error: null,
};

// ════════════════════════════════════════════════════════════════════════════
//  COMPUTED METRICS
// ════════════════════════════════════════════════════════════════════════════
function computeMetrics() {
  const post = S.responses.filter(r => r.phase === 'post_switch');
  const novel = S.responses.filter(r => r.phase === 'novel');

  let persev = 0;
  for (const r of post) {
    if (!r.isCorrect) persev++;
    else break;
  }

  const recoveryIdx = post.findIndex(r => r.isCorrect);
  const recoveryTrial = recoveryIdx === -1 ? null : recoveryIdx + 1;

  const postAcc = post.length ? post.filter(r => r.isCorrect).length / post.length : 0;
  const novelAcc = novel.length ? novel.filter(r => r.isCorrect).length / novel.length : 0;

  const seq = post.map(r => r.isCorrect ? '✓' : '✗').join('');
  const novelSeq = novel.map(r => r.isCorrect ? '✓' : '✗').join('');

  const oscil = post.reduce((c, r, i) =>
    i > 0 && r.isCorrect !== post[i - 1].isCorrect ? c + 1 : c, 0);

  return { persev, recoveryTrial, postAcc, novelAcc, seq, novelSeq, oscil };
}

// ════════════════════════════════════════════════════════════════════════════
//  SUBMISSION
// ════════════════════════════════════════════════════════════════════════════
async function submitResults() {
  S.saving = true;
  render();

  const metrics = computeMetrics();
  const payload = {
    pid: S.pid,
    condition: S.condition,
    timestamp: new Date().toISOString(),
    demographics: S.demographics,
    metrics,
    responses: S.responses,
    metacog: S.metacog,
  };

  // Always offer download as backup
  downloadJSON(payload);

  // Submit to Apps Script using hidden form + iframe to avoid CORS issues
  if (APPS_SCRIPT_URL) {
    try {
      await submitViaHiddenForm(payload);
    } catch (e) {
      S.error = 'Auto-submit failed — results were downloaded to your device instead.';
    }
  }

  S.saving = false;
  S.view = 'done';
  render();
}

function ensureHiddenTransport() {
  let iframe = document.getElementById('hidden_iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.name = 'hidden_iframe';
    iframe.id = 'hidden_iframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }

  let form = document.getElementById('gasForm');
  if (!form) {
    form = document.createElement('form');
    form.id = 'gasForm';
    form.method = 'POST';
    form.target = 'hidden_iframe';
    form.style.display = 'none';
    document.body.appendChild(form);
  }

  let input = document.getElementById('payloadField');
  if (!input) {
    input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.id = 'payloadField';
    form.appendChild(input);
  }

  form.action = APPS_SCRIPT_URL;
  return { form, input };
}

function submitViaHiddenForm(payload) {
  return new Promise((resolve, reject) => {
    if (!APPS_SCRIPT_URL) {
      resolve();
      return;
    }

    try {
      const { form, input } = ensureHiddenTransport();
      input.value = JSON.stringify(payload);
      form.submit();
      resolve();
    } catch (err) {
      reject(err);
    }
  });
}

function downloadJSON(payload) {
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `efbench_${S.pid}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════════════════════════════
//  EVENT HANDLERS
// ════════════════════════════════════════════════════════════════════════════
function handleDemographicsSubmit(e) {
  e.preventDefault();
  const f = e.target;
  S.demographics = {
    age: f.age.value,
    education: f.education.value,
    native_english: f.native_english.value,
    background: f.background.value,
  };
  S.view = 'instruction';
  render();
}

function handleResponse(response) {
  const trial = ALL_TRIALS[S.trialIdx];
  const correct = getCorrect(trial, S.trialIdx);
  const isCorrect = response === correct;
  const isPost = S.trialIdx >= 10;

  if (isPost) S.consec = isCorrect ? 0 : S.consec + 1;

  S.responses.push({
    trialIdx: S.trialIdx,
    sentence: trial.s,
    living: trial.living,
    response,
    correct,
    isCorrect,
    phase: S.trialIdx < 10 ? 'establishment' : S.trialIdx < 20 ? 'post_switch' : 'novel',
    rt_ms: Date.now() - S._trialStart,
  });

  const showHint =
    isPost && !isCorrect &&
    S.condition === 'partial_3' && S.consec >= 3;

  S.feedback = { isCorrect, showHint };
  S.view = 'feedback';
  render();
}

function handleNext() {
  const next = S.trialIdx + 1;
  if (next === 10 && S.condition === 'explicit') {
    S.trialIdx = next;
    S.view = 'announce';
    S.feedback = null;
  } else if (next >= 25) {
    S.trialIdx = next;
    S.view = 'metacog';
    S.feedback = null;
  } else {
    S.trialIdx = next;
    S.view = 'trial';
    S.feedback = null;
  }
  render();
}

function render() {

  if (view === 'welcome') {

            <option value="">Select…</option>
            <option value="yes">Yes</option>

          </select>
        </div>

          <label for="background">Primary background</label>
          <select name="background" id="background" required>
            <option value="">Select…</option>
            <option value="academia_science">Research / Academia (science, engineering, medicine)</option>
            <option value="academia_humanities">Research / Academia (humanities, social sciences)</option>
            <option value="industry_tech">Industry — technology</option>
            <option value="industry_other">Industry — other</option>
            <option value="student">Student</option>

          </select>

    `);

  }

  if (view === 'instruction') {
    setHTML(`

      <h1>Your task</h1>
      <p>For each sentence, decide whether it contains a living thing. Use this rule:</p>
      <div class="rule-box">

        RULE: If it does <em>not</em> contain a living thing<br>
        &nbsp;&nbsp;&nbsp;&nbsp;→ press <strong>OBJECT</strong>
      </div>
      <p>After each response, you will see feedback. <strong>Read the feedback carefully</strong> — it may contain important information.</p>
      <p>Respond as quickly and accurately as you can. There are 25 sentences in total.</p>
      <hr class="form-divider">
      <button class="btn" onclick="S.view='trial';S._trialStart=Date.now();render()">Start →</button>
    `);
    return;
  }

  if (view === 'announce') {
    setHTML(`
      <div class="eyebrow">Important — rule change</div>
      <h1>The rule has changed</h1>
      <div class="rule-box new-rule">

    const trial = ALL_TRIALS[trialIdx];
    const phase = trialIdx < 10 ? 'Part 1' : trialIdx < 20 ? 'Part 2' : 'Part 3';
    const pct = ((trialIdx + 1) / 25) * 100;
    const fb = feedback || {};
    setHTML(`
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>Trial ${trialIdx + 1} of 25</span>
          <span>${phase}</span>
        </div>
        <div class="progress-bar">

      </div>
    `);
    return;
  }

  if (view === 'metacog') {
    setHTML(`
      <div class="eyebrow">Final question</div>
      <h1>One last question</h1>
      <p>During the last several sentences, you may have received INCORRECT responses.</p>
      <p><strong>Did you notice anything unusual?</strong> If so, please describe in 2–3 sentences what you think happened.</p>
      <textarea
        placeholder="Your answer here…"
        oninput="S.metacog=this.value"
      >${metacog}</textarea>
      <p style="font-size:13px;color:#888">You can leave this blank if you have nothing to add.</p>
      <div style="margin-top:24px">
        <button class="btn" onclick="submitResults()" ${saving ? 'disabled' : ''}>
          ${saving ? 'Submitting…' : 'Submit →'}
        </button>
      </div>
    `);
    return;
  }

  if (view === 'done') {
    const metrics = computeMetrics();
    const seqHtml = metrics.seq.split('').map(c =>
      `<span class="${c === '✓' ? 'ok' : 'err'}">${c}</span>`).join('');
    setHTML(`
      <div class="eyebrow">Complete</div>
      <h1>Thank you!</h1>
      <p>Your participation is greatly appreciated.</p>
      ${error ? `<div class="info-box">${error}</div>` : ''}
      <div class="completion-box">
        <div style="font-family:'Courier New',monospace;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.1em">Completion code</div>
        <div class="completion-code">${STUDY_CODE}</div>
        <div style="font-size:13px;color:#888;margin-top:4px">Please note this code if required by the researcher.</div>
      </div>
      <div class="completion-box">
        <div style="font-family:'Courier New',monospace;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Your post-switch sequence</div>
        <div class="seq-display">${seqHtml || '—'}</div>
        <div style="font-size:12px;color:#999;margin-top:8px;font-family:'Courier New',monospace">
          perseveration: ${metrics.persev} trial${metrics.persev !== 1 ? 's' : ''} &nbsp;|&nbsp;
          accuracy: ${(metrics.postAcc * 100).toFixed(0)}%
        </div>
      </div>
      <p style="font-size:13px;color:#888">Your results have been downloaded to your device as a JSON file. If asked by the researcher, please send them this file.</p>
    `);
    return;
  }
}

function setHTML(html) {
  const app = document.getElementById('app');
  if (app) app.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const style = document.createElement('style');
  style.textContent = CSS;
  document.head.appendChild(style);

  const app = document.createElement('div');
  app.id = 'app';
  app.className = 'shell';
  document.body.appendChild(app);

  render();
});
</script>
</body>
